<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Counter App</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <div><input type="number" id="ageInput" placeholder="Enter Age Here"/>
        <button onclick="addAge()">Add Age</button></div>
        <div class="counter">
            <h3>Age Counter</h3>
            <p>People in their 10s: <span id="tens"></span></p>
            <p>People in their 20s: <span id="twenties"></span></p>
            <p>People in their 30s+: <span id="thirties"></span></p>
        </div>
    </div>
</body>
</html>
